name: Update Ace of Cups Calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '15 11 * * *'

permissions:
  contents: write

jobs:
  update-aceofcups:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests icalendar beautifulsoup4

      - name: Generate calendar
        run: |
          python update_aceofcups.py

      - name: Commit updated calendar
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add aceofcups.ics

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "Update Ace of Cups calendar"
            git push
          fi
